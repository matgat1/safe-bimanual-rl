# SAC agent configuration for the tray pickup grasp phase

# Training parameters
n_epochs: 200
n_steps: 15000
n_steps_per_fit: 4
n_episodes_test: 5
initial_replay_size: 10000
max_replay_size: 200000
batch_size: 256
n_features: 256
warmup_transitions: 10000
tau: 0.001
lr_alpha: 1e-3
lr_actor: 3e-4
lr_critic: 3e-4
use_cluster: true
save_model: true
use_wandb: true
model_name: "grasp_sac"

# Reward parameters
handle_distance_weight: 1.5
reach_sharpness: 0.15
grasp_force_threshold: 0.3
success_grasp_reward: 30.0
contact_threshold: 3.0
contact_cost_weight: -1e-4
tray_contact_threshold: 1.5
tray_contact_cost_weight: -1e-4
lift_height_weight: 2.0
lift_sharpness: 0.1
lift_target_height: 0.5
success_lift_reward: 100.0
action_space_limit: 0.2
target_entropy: null
seed: 0
